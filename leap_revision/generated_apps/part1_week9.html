    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Tinos:wght@700&display=swap');

        body {
            background-color: #007BFF;
            font-family: 'Noto Sans JP', sans-serif;
        }

        .font-english {
            font-family: 'Tinos', 'Times New Roman', serif;
            font-weight: 700;
            font-size: 1.25rem;
            line-height: 1.75rem;
        }

        .answer-span {
            color: #DC2626;
            font-weight: 700;
            display: none;
        }

        .underline-span {
            text-decoration: underline;
            text-underline-offset: 4px;
            display: inline;
        }

        .show-answer .answer-span {
            display: inline;
        }

        .show-answer .underline-span {
            display: none;
        }

        .explanation {
            display: none;
            white-space: pre-wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .btn-primary {
            background-color: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .btn-secondary {
            background-color: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #4b5563;
        }

        @media (max-width: 640px) {
            #control-panel {
                padding: 0.5rem;
            }

            #control-panel button {
                padding: 0.5rem 0.75rem;
                font-size: 0.8rem;
            }
        }

        .sentence-item.word-mastered {
            border-color: #f59e0b !important;
            background-color: #fef3c7 !important;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.15);
        }
        .sentence-item.word-mastered .toggle-master-btn-local {
            background-color: #f59e0b !important;
        }
        .sentence-item.word-mastered .toggle-master-btn-local:hover {
            background-color: #d97706 !important;
        }
    </style>
</head>

                </div>

                    <!-- Sentences will be populated by JS -->
                </div>
            </main>
        </div>

        function getBestEnglishVoice(voices) {
            const excludedVoices = [
                'albert', 'bad news', 'bells', 'boing', 'bubbles', 'cellos', 
                'deranged', 'good news', 'hysterical', 'pipe organ', 'trinoids', 
                'whisper', 'zarvox', 'fred', 'juniper', 'ralph', 'kathy', 'siri'
            ];
            
            const englishVoices = voices.filter(v => {
                const lang = v.lang.toLowerCase();
                const name = v.name.toLowerCase();
                return lang.startsWith('en') && !excludedVoices.some(ex => name.includes(ex));
            });

            if (englishVoices.length === 0) {
                return voices.find(v => v.lang.toLowerCase().startsWith('en')) || null;
            }

            const isGoogle = v => v.name.toLowerCase().includes('google');
            const isSamantha = v => v.name.toLowerCase().includes('samantha');
            const isDaniel = v => v.name.toLowerCase().includes('daniel');
            const isPremium = v => v.name.toLowerCase().includes('premium') || v.name.toLowerCase().includes('enhanced') || v.name.toLowerCase().includes('natural');
            const isUS = v => v.lang.toLowerCase() === 'en-us';
            const isGB = v => v.lang.toLowerCase() === 'en-gb';

            let voice = englishVoices.find(v => isUS(v) && isGoogle(v));
            if (voice) return voice;

            voice = englishVoices.find(v => isGB(v) && isGoogle(v));
            if (voice) return voice;

            voice = englishVoices.find(isGoogle);
            if (voice) return voice;

            voice = englishVoices.find(isSamantha);
            if (voice) return voice;

            voice = englishVoices.find(isDaniel);

            voice = englishVoices.find(v => isUS(v) && isPremium(v));
            if (voice) return voice;

            voice = englishVoices.find(isPremium);
            if (voice) return voice;

            voice = englishVoices.find(v => isUS(v));
            if (voice) return voice;

            voice = englishVoices.find(v => isGB(v));
            if (voice) return voice;

            return englishVoices[0];

                        'give': ['gave', 'given'], 'get': ['got', 'gotten'], 'forget': ['forgot', 'forgotten'],
                        'begin': ['began', 'begun'], 'drink': ['drank', 'drunk'], 'swim': ['swam', 'swum'],
                        'sing': ['sang', 'sung'], 'ring': ['rang', 'rung'], 'drive': ['drove', 'driven'],
                        'ride': ['rode', 'ridden'], 'eat': ['ate', 'eaten'], 'fall': ['fell', 'fallen'],
                        'hold': ['held'], 'stand': ['stood'], 'sit': ['sat'], 'win': ['won'], 'pay': ['paid'],
                        'sell': ['sold'], 'break': ['broke', 'broken'], 'wear': ['wore', 'worn'],
                        'grow': ['grew', 'grown'], 'fly': ['flew', 'flown'], 'blow': ['blew', 'blown'],
                        'draw': ['drew', 'drawn'], 'throw': ['threw', 'thrown'], 'hide': ['hid', 'hidden'],
                        'fight': ['fought'], 'feed': ['fed'], 'strike': ['struck'], 'wake': ['woke', 'woken'],
                        'bear': ['bore', 'born'], 'beat': ['beat', 'beaten'], 'bind': ['bound'], 'bleed': ['bled'],
                        'breed': ['bred'], 'tear': ['tore', 'torn'], 'sweep': ['swept'], 'weep': ['wept'],
                        'bend': ['bent'], 'lend': ['lent'], 'mean': ['meant'], 'lead': ['led'], 'shoot': ['shot']
                    };
                    
                    if (irregulars[w]) searchWords.push(...irregulars[w]);
                }
            }

            for (let actualWord of searchWords) {
                if (!actualWord) continue;
                try {
                    const regex = new RegExp(`\\b${actualWord}\\b`, 'gi');
                    if (regex.test(enSentence)) {
                        return enSentence.replace(regex, match => `<span class="answer-span">${match}</span><span class="underline-span">${blank}</span>`);
                    }
                } catch (e) { }
            }
            
            for (let actualWord of searchWords) {
                if (!actualWord) continue;
                if (enSentence.toLowerCase().includes(actualWord.toLowerCase())) {
                    const index = enSentence.toLowerCase().indexOf(actualWord.toLowerCase());
                    if (index !== -1) {
                        const originalWord = enSentence.substring(index, index + actualWord.length);
                        return enSentence.substring(0, index) +
                            `<span class="answer-span">${originalWord}</span><span class="underline-span">${blank}</span>` +
                            enSentence.substring(index + actualWord.length);
                    }
                }
            }

            return enSentence;
        }

        function renderChapter() {
            sentenceList.innerHTML = '';
            chapterData.forEach(item => {
                const sentenceDiv = document.createElement('div');
                sentenceDiv.className = 'sentence-item p-4 border border-gray-200 rounded-lg bg-white transition-shadow duration-300 hover:shadow-md';
                sentenceDiv.dataset.id = item.id;
                sentenceDiv.dataset.fullSentence = item.en;

                const englishSentenceHtml = formatEnglishSentence(item);

                sentenceDiv.innerHTML = `
        <div class="flex items-start space-x-4">
            <input type="checkbox" class="sentence-checkbox mt-1 h-5 w-5 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" data-id="${item.id}">
            <span class="text-sm font-bold text-gray-400 w-16">${item.id}</span>
            <div class="flex-1 cursor-pointer">
                ${item.ja ? '<p class="mb-2 text-gray-700">' + item.ja + '</p>' : ""}
                <p class="font-english">${englishSentenceHtml}</p>
                
                <div class="action-buttons mt-4 hidden flex-wrap gap-2">
                    <button class="toggle-answer-btn-local bg-blue-500 hover:bg-blue-600 text-white font-bold py-1 px-3 rounded shadow-md text-sm">表示/非表示</button>
                    <button class="play-sound-btn-local bg-green-500 hover:bg-green-600 text-white font-bold py-1 px-3 rounded shadow-md text-sm">音声再生</button>
                    <button class="play-slow-btn-local bg-teal-500 hover:bg-teal-600 text-white font-bold py-1 px-3 rounded shadow-md text-sm">ゆっくり</button>
                    <button class="record-btn-local bg-red-500 hover:bg-red-600 text-white font-bold py-1 px-3 rounded shadow-md text-sm">録音評価</button>
                    <button class="toggle-explanation-btn-local bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-1 px-3 rounded shadow-md text-sm">語の意味</button>
                    <button class="toggle-master-btn-local bg-gray-500 hover:bg-gray-600 text-white font-bold py-1 px-3 rounded shadow-md text-sm">⭐ マスター</button>
                </div>

                <div class="explanation mt-4 p-4 bg-blue-50 border-l-4 border-blue-400 text-gray-700 rounded-r-lg" style="display: none;">
                ${item.explanation}
                </div>
            </div>
        </div>
        `;
                sentenceList.appendChild(sentenceDiv);
            });

            document.querySelectorAll('.sentence-item .flex-1').forEach(item => {
                item.addEventListener('click', (e) => {
                    if(e.target.tagName === 'BUTTON') return;
                    const sentenceWrapper = e.currentTarget.closest('.sentence-item');
                    if (activeSentenceElement && activeSentenceElement !== sentenceWrapper) {
                        activeSentenceElement.classList.remove('ring-2', 'ring-blue-400', 'shadow-xl');
                        activeSentenceElement.querySelector('.action-buttons').classList.add('hidden');
                        activeSentenceElement.querySelector('.action-buttons').classList.remove('flex');
                    }
                    activeSentenceElement = sentenceWrapper;
                    activeSentenceElement.classList.add('ring-2', 'ring-blue-400', 'shadow-xl');
                    activeSentenceElement.querySelector('.action-buttons').classList.remove('hidden');
                    activeSentenceElement.querySelector('.action-buttons').classList.add('flex');
                });
                
                item.querySelector('.toggle-answer-btn-local').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const sentenceWrapper = e.currentTarget.closest('.sentence-item');
                    sentenceWrapper.classList.toggle('show-answer');
                });
                
                item.querySelector('.play-sound-btn-local').addEventListener('click', (e) => {
                    e.stopPropagation();
                    playSound(1.0);
                });
                
                item.querySelector('.play-slow-btn-local').addEventListener('click', (e) => {
                    e.stopPropagation();
                    playSound(0.8);
                });
                
                item.querySelector('.record-btn-local').addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleRecording();
                });
                
                item.querySelector('.toggle-explanation-btn-local').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const sentenceWrapper = e.currentTarget.closest('.sentence-item');
                    const exp = sentenceWrapper.querySelector('.explanation');
                    if (exp) exp.style.display = exp.style.display === 'block' ? 'none' : 'block';
                });

                item.querySelector('.toggle-master-btn-local').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const sentenceWrapper = e.currentTarget.closest('.sentence-item');
                    const wordId = sentenceWrapper.dataset.id;
                    const isMastered = sentenceWrapper.classList.contains('word-mastered');
                    if (window.toggleWordMasterState) {
                        window.toggleWordMasterState(wordId, !isMastered);
                    } else {
                        sentenceWrapper.classList.toggle('word-mastered');
                        e.currentTarget.innerText = sentenceWrapper.classList.contains('word-mastered') ? "⭐ マスター解除" : "⭐ マスター";
                    }
                });
            });

            document.querySelectorAll('.sentence-checkbox').forEach(checkbox => {
                checkbox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (e.target.checked) selectedSentences.add(e.target.dataset.id);
                    else selectedSentences.delete(e.target.dataset.id);
                });
            });

            if (sentenceList.firstChild) sentenceList.firstChild.querySelector('.flex-1').click();
        }

        function showMessage(htmlContent, duration = null) {
            messageContent.innerHTML = htmlContent;
            messageModal.classList.remove('hidden');
            if (duration) setTimeout(() => messageModal.classList.add('hidden'), duration);
        }

        function playSound(speed = 1.0) {
            if (!activeSentenceElement) return;
            const text = activeSentenceElement.dataset.fullSentence;
            if (!text) return;

            try {
                speechSynthesis.cancel();
            } catch (e) {}

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = speed;

            const voices = speechSynthesis.getVoices();
            const bestVoice = getBestEnglishVoice(voices);
            if (bestVoice) {
                utterance.voice = bestVoice;
                utterance.lang = bestVoice.lang;
            } else {
                console.warn("No custom English voice found, using browser default.");
            }

            utterance.onerror = (e) => {
                console.error("SpeechSynthesis error:", e.error);
            };

            speechSynthesis.speak(utterance);
        }

        function handleRecording() {
            if (!activeSentenceElement) return;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showMessage('<p>お使いのブラウザは音声認識に対応していません。</p>', 3000);
                return;
            }
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.onstart = () => showMessage('<p class="text-2xl">マイクに向かって話してください...</p><div class="animate-pulse text-red-500 text-4xl mt-4">●</div>');
            recognition.onresult = (event) => evaluatePronunciation(event.results[0][0].transcript);
            recognition.onerror = () => showMessage('<p>認識エラーが発生しました。</p>', 2000);
            recognition.start();
        }

        function evaluatePronunciation(transcript) {
            const original = activeSentenceElement.dataset.fullSentence.toLowerCase().replace(/[^\w\s]/g, '');
            const user = transcript.toLowerCase().replace(/[^\w\s]/g, '');
            const score = Math.min(100, Math.floor((user.split(' ').filter(w => original.includes(w)).length / original.split(' ').length) * 100) + 15);

            if (score >= 80) {
                const wordId = activeSentenceElement.dataset.id;
                if (window.toggleWordMasterState) {
                    window.toggleWordMasterState(wordId, true);
                } else {
                    const wrapper = document.querySelector(`.sentence-item[data-id="${wordId}"]`);
                    if (wrapper) {
                        wrapper.classList.add('word-mastered');
                        const btn = wrapper.querySelector('.toggle-master-btn-local');
                        if (btn) btn.innerText = "⭐ マスター解除";
                    }
                }
            }

            if(window.saveLeapScore) window.saveLeapScore('pronunciationScore_' + activeSentenceElement.dataset.id, score);
            showMessage(`
                <h3 class="text-2xl font-bold mb-4">評価結果</h3>
                <p class="text-7xl font-bold text-blue-600 mb-4">${score}<span class="text-2xl">点</span></p>
                <p class="text-gray-600 mb-2"><strong>認識結果:</strong> ${transcript}</p>
                <button onclick="document.getElementById('message-modal').classList.add('hidden')" class="mt-6 bg-blue-500 text-white py-2 px-6 rounded-lg">閉じる</button>
            `);
        }

        function startQuiz() {
            const questions = [...chapterData].sort(() => 0.5 - Math.random()).slice(0, 10);
            let currentIdx = 0, score = 0;

            function extractBlankWord(item) {
                const formatted = formatEnglishSentence(item);
                const match = formatted.match(/<span class="answer-span">([\s\S]*?)<\/span>/);
                return match ? match[1].trim() : item.answer;
            }

            function nextQuestion() {
                if (currentIdx >= questions.length) {
                    const finalScore = Math.round(score / questions.length * 100);
                    if (window.saveLeapScore) {
                        window.saveLeapScore('quizScore', finalScore);
                    } else {
                        console.error("Firebase saveLeapScore is not loaded yet.");
                        alert("データベース連携が初期化されていません。ネットワーク接続が正常か、または広告ブロック/セキュリティ拡張機能により連携スクリプトの読込がブロックされていないかご確認ください。");
                    }
                    quizContent.innerHTML = `<h3 class="text-3xl font-bold mb-4">結果: ${score}/${questions.length}</h3><p class="text-6xl text-purple-600 font-bold">${finalScore}点</p>`;
                    return;
                }
                const q = questions[currentIdx];
                const correctWord = extractBlankWord(q);
                
                const formattedQ = formatEnglishSentence(q);
                let displaySentence = formattedQ.replace(/<span class="answer-span">[\s\S]*?<\/span><span class="underline-span">__________<\/span>/g, '__________');
                if (displaySentence === q.en && q.en) {
                    displaySentence = q.en;
                } else if (!q.en) {
                    displaySentence = "(例文なし)";
                }

                const allOtherWords = chapterData.filter(d => d.id !== q.id).map(d => extractBlankWord(d));
                const uniqueOtherWords = [...new Set(allOtherWords)].filter(w => w !== correctWord);
                const distractors = uniqueOtherWords.sort(() => 0.5 - Math.random()).slice(0, 3);
                
                const options = [correctWord, ...distractors].sort(() => 0.5 - Math.random());

                quizContent.innerHTML = `
                    <p class="mb-2 text-gray-500">問題 ${currentIdx + 1}/10</p>
                    <p class="text-lg font-bold mb-2 text-gray-700">${q.ja}</p>
                    <p class="text-xl font-bold mb-6 font-english text-blue-800">${displaySentence}</p>
                    <div class="grid grid-cols-1 gap-3">
                        ${options.map(opt => `<button class="quiz-opt p-3 border-2 border-gray-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 font-english transition-colors">${opt}</button>`).join('')}
                    </div>
                `;
                document.querySelectorAll('.quiz-opt').forEach(btn => {
                    btn.onclick = () => {
                        if (btn.innerText === correctWord) { btn.classList.add('bg-green-200', 'border-green-400'); score++; }
                        else { btn.classList.add('bg-red-200', 'border-red-400'); }
                        
                        document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
                        
                        // 3 seconds timeout to verify answer details
                        setTimeout(() => { currentIdx++; nextQuestion(); }, 3000);
                    };
                });
            }
            quizModal.classList.remove('hidden');
            nextQuestion();
        }

        // --- PDF Print Logic ---
        function openPrintWindow(content, title) {
            const win = window.open('', '_blank');
            win.document.write(`<html><head><title>${title}</title><style>body{font-family:sans-serif;padding:40px} .list{column-count:2} li{margin-bottom:10px} .ans{margin-top:50px;border-top:1px solid #000;padding-top:20px}</style></head><body><h1>${title}</h1>${content}</body></html>`);
            win.document.close();
            setTimeout(() => { win.focus(); win.print(); }, 500);
        }

        function getSelected() {
            return Array.from(selectedSentences).map(id => chapterData.find(d => d.id == id)).sort((a, b) => String(a.id).localeCompare(String(b.id), undefined, { numeric: true }));
        }

        startQuizBtn.onclick = startQuiz;
        closeQuizBtn.onclick = () => quizModal.classList.add('hidden');
        openPdfModalBtn.onclick = () => selectedSentences.size ? pdfModal.classList.remove('hidden') : showMessage('問題を選択してください', 2000);
        closeModalBtn.onclick = () => pdfModal.classList.add('hidden');
        selectAllCheckbox.onchange = (e) => {
            document.querySelectorAll('.sentence-checkbox').forEach(cb => {
                cb.checked = e.target.checked;
                if (e.target.checked) selectedSentences.add(cb.dataset.id);
                else selectedSentences.delete(cb.dataset.id);
            });
        };

        document.getElementById('download-list-btn').onclick = () => {
            const items = getSelected();
            const html = `<div class="list"><ul>${items.map(i => `<li><strong>${i.answer}</strong>: ${i.explanation}</li>`).join('')}</ul></div>`;
            openPrintWindow(html, '重要語句リスト');
        };

        document.getElementById('download-sentence-quiz-btn').onclick = () => {
            const items = getSelected();
            const html = `<ol>${items.map(i => {
                if (!i.en) return `<li>（例文なし: ${i.answer}）</li>`;
                let displaySentence = formatEnglishSentence(i).replace(/<span class="answer-span">[\s\S]*?<\/span><span class="underline-span">__________<\/span>/g, '__________');
                return `<li>${displaySentence}<br><small>${i.ja}</small></li>`;
            }).join('')}</ol><div class="ans"><h3>解答</h3><p>${items.map(i => i.answer).join(', ')}</p></div>`;
            openPrintWindow(html, '例文穴埋めテスト');
        };

        document.getElementById('download-en-quiz-btn').onclick = () => {
            const items = getSelected();
            const html = `<div class="list"><ul>${items.map(i => `<li>[日本語]: ${i.ja}<br>[英語]: __________</li>`).join('')}</ul></div><div class="ans"><h3>解答</h3><p>${items.map(i => i.answer).join(', ')}</p></div>`;
            openPrintWindow(html, '英単語テスト');
        };

        document.getElementById('download-ja-quiz-btn').onclick = () => {
            const items = getSelected();
            const html = `<div class="list"><ul>${items.map(i => `<li>[英語]: ${i.answer}<br>[意味]: __________</li>`).join('')}</ul></div><div class="ans"><h3>解答</h3><p>${items.map(i => i.explanation.split('\n')[0]).join('<br>')}</p></div>`;
            openPrintWindow(html, '意味テスト');
        };

        document.getElementById('download-mixed-quiz-btn').onclick = () => {
            const items = getSelected();
            const html = `<div class="list"><ul>${items.map(i => {
                return Math.random() > 0.5
                    ? `<li>[日本語]: ${i.ja}<br>[英語]: __________</li>`
                    : `<li>[英語]: ${i.answer}<br>[意味]: __________</li>`;
            }).join('')}</ul></div><div class="ans"><h3>解答</h3><p>${items.map(i => i.answer + ' / ' + i.explanation).join('<br>')}</p></div>`;
            openPrintWindow(html, '英単語・意味混合テスト');
        };

        document.getElementById('download-sentence-mixed-quiz-btn').onclick = () => {
            const items = getSelected();
            const html = `<ol>${items.map(i => {
                if (!i.en) {
                    return `<li>[英語]: ${i.answer}<br>[意味]: __________</li>`;
                }
                if (Math.random() > 0.5) {
                    let displaySentence = formatEnglishSentence(i).replace(/<span class="answer-span">[\s\S]*?<\/span><span class="underline-span">__________<\/span>/g, '__________');
                    return `<li>${displaySentence}<br><small>${i.ja}</small></li>`;
                } else {
                    return `<li>[英語]: ${i.answer}<br>[意味]: __________</li>`;
                }
            }).join('')}</ol><div class="ans"><h3>解答</h3><p>${items.map(i => i.answer + ' / ' + i.explanation.split('\n')[0]).join('<br>')}</p></div>`;
            openPrintWindow(html, 'ランダム混合テスト');
        };

        document.addEventListener('DOMContentLoaded', renderChapter);
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNrvDMnlN_geijgRguQrolnTIZ_rdZwyw",
            authDomain: "sokudoku-stories-db.firebaseapp.com",
            projectId: "sokudoku-stories-db",
            storageBucket: "sokudoku-stories-db.firebasestorage.app",
            messagingSenderId: "979353290932",
            appId: "1:979353290932:web:f0c512cfbe64a7afe36fe1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Prefix page ID with 'revision_' to isolate LEAP Revision data from LEAP Basic
        const pageId = window.location.pathname.split('/').pop().replace('.html', '');
        const appId = "revision_" + pageId;

        window.localMasteredWords = {};

        window.applyLoadedMasteredWords = (masteredWords) => {
            window.localMasteredWords = masteredWords || {};
            document.querySelectorAll('.sentence-item').forEach(wrapper => {
                const wordId = wrapper.dataset.id;
                const btn = wrapper.querySelector('.toggle-master-btn-local');
                if (window.localMasteredWords[wordId] === true) {
                    wrapper.classList.add('word-mastered');
                    if(btn) btn.innerText = "⭐ マスター解除";
                } else {
                    wrapper.classList.remove('word-mastered');
                    if(btn) btn.innerText = "⭐ マスター";
                }
            });
        };

        window.toggleWordMasterState = (wordId, makeMastered) => {
            if (window.currentUser) {
                const docRef = doc(db, "leap_users", window.currentUser.uid, "progress", appId);
                window.localMasteredWords[wordId] = makeMastered;
                
                const updateData = {
                    masteredWords: {
                        [wordId]: makeMastered
                    }
                };
                
                setDoc(docRef, updateData, { merge: true })
                .then(() => {
                    console.log(`Word ${wordId} master state:`, makeMastered);
                    window.applyLoadedMasteredWords(window.localMasteredWords);
                })
                .catch(e => {
                    console.error("Error updating word master:", e);
                    alert("マスター状態の保存に失敗しました: " + e.message);
                });
            } else {
                window.localMasteredWords[wordId] = makeMastered;
                window.applyLoadedMasteredWords(window.localMasteredWords);
                console.warn("Saving locally only.");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                console.log("Firebase Authenticated as:", user.email);
                const docRef = doc(db, "leap_users", user.uid, "progress", appId);
                
                getDoc(docRef).then((docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        window.applyLoadedMasteredWords(data.masteredWords);
                    }
                }).catch(e => console.error("Error loading mastered words:", e));

                setDoc(docRef, {
                    started: true,
                    lastAccessed: new Date().toISOString()
                }, { merge: true }).then(() => {
                    console.log("Progress started state saved successfully.");
                }).catch(e => {
                    console.error("Progress save error:", e);
                    alert("進捗の自動保存に失敗しました: " + e.message);
                });
                
                setDoc(doc(db, "leap_users", user.uid), {
                    displayName: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    lastLogin: new Date().toISOString()
                }, { merge: true }).catch(e => console.error("User profile save error:", e));
            } else {
                console.warn("No user session active on this page.");
            }
        });

        window.saveLeapScore = (type, score) => {
            if (window.currentUser) {
                const docRef = doc(db, "leap_users", window.currentUser.uid, "progress", appId);
                const updateData = {};
                updateData[type] = score;
                setDoc(docRef, updateData, { merge: true })
                .then(() => {
                    console.log("Score saved successfully:", type, score);
                })
                .catch(e => {
                    console.error("Score save error:", e);
                    alert("テスト結果の保存に失敗しました: " + e.message);
                });
            } else {
                console.error("Score save failed: No user is logged in.");
                alert("ログイン状態が確認できないため、テスト結果を保存できませんでした。ダッシュボードから再度ログインしてください。");
            }
        };
    </script>
